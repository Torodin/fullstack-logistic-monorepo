<section class="tracking-container">
    <h2>Track your shipment</h2>
    <form class="tracking-form" (ngSubmit)="onSubmit()">
        <p-inputgroup>
            <input
                type="text"
                name="trackingCode"
                pInputText
                [(ngModel)]="trackingCode"
                placeholder="Enter tracking code"
                [disabled]="isLoading"
                required
            />
            <p-button type="submit" label="Search" [disabled]="isLoading || !trackingCode.trim()" icon="pi pi-search"/>
        </p-inputgroup>
    </form>

    @if (trackingData$ | async; as trackingData) {
        <div class="card m-4 p-8">
            <p-panel header="Current State: {{ trackingData.state }}">
                @for (event of trackingData.events; track event.id) {
                    <div class="mb-4 p-8">
                        <p-card header="{{ event.date | date:'short' }} - {{ event.location }}">
                            <p class="m-0">
                                {{ event.notes }}
                            </p>
                        </p-card>
                    </div>
                }
            </p-panel>
        </div>
    }
</section>
